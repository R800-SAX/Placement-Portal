{% extends "base.html" %}

{% block title %}Student Registration | PlaceTrack AI{% endblock %}

{% block public_content %}
<div class="glass-panel" style="max-width: 700px; margin: 40px auto; padding: 40px; border-radius: 20px;">
    <h2 style="font-size:24px; font-weight:800; text-align:center; margin-bottom:6px;">Candidate Registration</h2>
    <p style="color:var(--text-muted); text-align:center; font-size:14px; margin-bottom:30px;">Create your student account. All registrations undergo coordinator verification.</p>
    
    <form action="{{ url_for('auth.register_student') }}" method="POST" style="display:flex; flex-direction:column; gap:20px;">
        
        <h3 style="font-size:16px; font-weight:700; color:var(--color-primary); border-bottom:1px solid var(--border-color); padding-bottom:6px;">Personal Details</h3>
        
        <div class="form-grid">
            <div class="form-group" style="margin-bottom:0;">
                <label class="form-label" for="firstname">First Name</label>
                <input type="text" id="firstname" name="firstname" class="form-control" placeholder="Atinder" required>
            </div>
            <div class="form-group" style="margin-bottom:0;">
                <label class="form-label" for="lastname">Last Name</label>
                <input type="text" id="lastname" name="lastname" class="form-control" placeholder="Kumar" required>
            </div>
        </div>

        <div class="form-grid">
            <div class="form-group" style="margin-bottom:0;">
                <label class="form-label" for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="atinder@gmail.com" required>
            </div>
            <div class="form-group" style="margin-bottom:0;">
                <label class="form-label" for="contactno">Contact Number</label>
                <input type="tel" id="contactno" name="contactno" class="form-control" placeholder="9876543210" required>
            </div>
        </div>

        <div class="form-grid">
            <div class="form-group" style="margin-bottom:0;">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <div class="form-group" style="margin-bottom:0;">
                <label class="form-label" for="cpassword">Confirm Password</label>
                <input type="password" id="cpassword" name="cpassword" class="form-control" placeholder="••••••••" required>
            </div>
        </div>

        <div class="form-grid">
            <div class="form-group" style="margin-bottom:0;">
                <label class="form-label" for="dob">Date of Birth</label>
                <input type="date" id="dob" name="dob" class="form-control" required>
            </div>
            <div class="form-group" style="margin-bottom:0;">
                <label class="form-label" for="age">Age</label>
                <input type="number" id="age" name="age" class="form-control" placeholder="22" required>
            </div>
        </div>

        <div class="form-group" style="margin-bottom:0;">
            <label class="form-label" for="address">Correspondence Address</label>
            <textarea id="address" name="address" class="form-control" rows="2" placeholder="Sector 62, Noida, UP" required></textarea>
        </div>

        <div class="form-grid">
            <div class="form-group" style="margin-bottom:0;">
                <label class="form-label" for="state-select">State</label>
                <select id="state-select" name="state" class="form-control" required style="background: var(--bg-main); color:#fff;">
                    <option value="">Choose State...</option>
                    {% for state in states %}
                        <option value="{{ state.id }}">{{ state.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group" style="margin-bottom:0;">
                <label class="form-label" for="city-select">City</label>
                <select id="city-select" name="city" class="form-control" required style="background: var(--bg-main); color:#fff;">
                    <option value="">Choose State First...</option>
                </select>
            </div>
        </div>

        <h3 style="font-size:16px; font-weight:700; color:var(--color-primary); border-bottom:1px solid var(--border-color); padding-bottom:6px; margin-top:10px;">Academic Details</h3>

        <div class="form-grid">
            <div class="form-group" style="margin-bottom:0;">
                <label class="form-label" for="qualification">Course / Qualification</label>
                <input type="text" id="qualification" name="qualification" class="form-control" placeholder="B.Tech" required>
            </div>
            <div class="form-group" style="margin-bottom:0;">
                <label class="form-label" for="stream">Branch / Stream</label>
                <input type="text" id="stream" name="stream" class="form-control" placeholder="Computer Science" required>
            </div>
        </div>

        <div class="form-grid">
            <div class="form-group" style="margin-bottom:0;">
                <label class="form-label" for="passingyear">Passing Year</label>
                <input type="number" id="passingyear" name="passingyear" class="form-control" placeholder="2026" required>
            </div>
            <div class="form-group" style="margin-bottom:0;">
                <label class="form-label" for="skills">Key Skills (Comma Separated)</label>
                <input type="text" id="skills" name="skills" class="form-control" placeholder="Python, SQL, HTML, CSS" required>
            </div>
        </div>

        <div class="form-grid" style="grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));">
            <div class="form-group" style="margin-bottom:0;">
                <label class="form-label" for="ssc">10th Class (%)</label>
                <input type="number" id="ssc" name="ssc" class="form-control" placeholder="85" required>
            </div>
            <div class="form-group" style="margin-bottom:0;">
                <label class="form-label" for="hsc">12th Class (%)</label>
                <input type="text" id="hsc" name="hsc" class="form-control" placeholder="88%" required>
            </div>
            <div class="form-group" style="margin-bottom:0;">
                <label class="form-label" for="ug">UG Marks / CGPA (%)</label>
                <input type="number" id="ug" name="ug" class="form-control" placeholder="82" required>
            </div>
            <div class="form-group" style="margin-bottom:0;">
                <label class="form-label" for="pg">PG Marks (%) (Optional)</label>
                <input type="number" id="pg" name="pg" class="form-control" placeholder="0">
            </div>
        </div>

        <button type="submit" class="btn-primary" style="justify-content:center; padding:12px; font-size:15px; margin-top:10px;">
            <i class="fa-solid fa-user-plus"></i> Submit Registration
        </button>
    </form>
</div>
{% endblock %}
