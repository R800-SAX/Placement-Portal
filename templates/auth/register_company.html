{% extends "base.html" %}

{% block title %}Recruiter Registration | PlaceTrack AI{% endblock %}

{% block public_content %}
<div class="glass-panel" style="max-width: 650px; margin: 40px auto; padding: 40px; border-radius: 20px;">
    <h2 style="font-size:24px; font-weight:800; text-align:center; margin-bottom:6px;">Recruiter Registration</h2>
    <p style="color:var(--text-muted); text-align:center; font-size:14px; margin-bottom:30px;">Register your organization to post job openings and search graduating candidates.</p>
    
    <form action="{{ url_for('auth.register_company') }}" method="POST" style="display:flex; flex-direction:column; gap:20px;">
        
        <h3 style="font-size:16px; font-weight:700; color:var(--color-primary); border-bottom:1px solid var(--border-color); padding-bottom:6px;">Company Profile</h3>
        
        <div class="form-grid">
            <div class="form-group" style="margin-bottom:0;">
                <label class="form-label" for="companyname">Company Name</label>
                <input type="text" id="companyname" name="companyname" class="form-control" placeholder="Tech Solutions Inc." required>
            </div>
            <div class="form-group" style="margin-bottom:0;">
                <label class="form-label" for="name">Contact Person (HR Name)</label>
                <input type="text" id="name" name="name" class="form-control" placeholder="Sumit Sharma" required>
            </div>
        </div>

        <div class="form-grid">
            <div class="form-group" style="margin-bottom:0;">
                <label class="form-label" for="email">HR Email Address</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="recruiter@example.com" required>
            </div>
            <div class="form-group" style="margin-bottom:0;">
                <label class="form-label" for="contactno">Contact Number</label>
                <input type="tel" id="contactno" name="contactno" class="form-control" placeholder="9999988888" required>
            </div>
        </div>

        <div class="form-grid">
            <div class="form-group" style="margin-bottom:0;">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <div class="form-group" style="margin-bottom:0;">
                <label class="form-label" for="cpassword">Confirm Password</label>
                <input type="password" id="cpassword" name="cpassword" class="form-control" placeholder="••••••••" required>
            </div>
        </div>

        <div class="form-group" style="margin-bottom:0;">
            <label class="form-label" for="website">Company Website URL</label>
            <input type="url" id="website" name="website" class="form-control" placeholder="https://techsolutions.example.com" required>
        </div>

        <div class="form-grid">
            <div class="form-group" style="margin-bottom:0;">
                <label class="form-label" for="state-select">State Location</label>
                <select id="state-select" name="state" class="form-control" required style="background: var(--bg-main); color:#fff;">
                    <option value="">Choose State...</option>
                    {% for state in states %}
                        <option value="{{ state.id }}">{{ state.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group" style="margin-bottom:0;">
                <label class="form-label" for="city-select">City Location</label>
                <select id="city-select" name="city" class="form-control" required style="background: var(--bg-main); color:#fff;">
                    <option value="">Choose State First...</option>
                </select>
            </div>
        </div>

        <div class="form-group" style="margin-bottom:0;">
            <label class="form-label" for="aboutme">Brief About Us</label>
            <textarea id="aboutme" name="aboutme" class="form-control" rows="3" placeholder="Describe your company, key divisions, and tech stacks used..." required></textarea>
        </div>

        <button type="submit" class="btn-primary" style="justify-content:center; padding:12px; font-size:15px; margin-top:10px;">
            <i class="fa-solid fa-briefcase"></i> Submit Recruiter Registration
        </button>
    </form>
</div>
{% endblock %}
